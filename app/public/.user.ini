; PHP runtime limits for file uploads (read by PHP-FPM / CGI / FastCGI).
; The application accepts documents up to 7 MB per file (passport photo,
; Aadhaar proof, DOB proof). The host default upload_max_filesize was 2 MB,
; which silently rejected larger DOB-proof scans/photos. Raise the per-file
; limit above 7 MB and the total POST size to comfortably hold several files
; in one submit.
upload_max_filesize = 8M
post_max_size = 32M
max_file_uploads = 20
